# GoReleaser v2 — https://goreleaser.com
version: 2

project_name: zed-creds

before:
  hooks:
    - cd app && go mod tidy

builds:
  - id: zed-creds
    dir: app
    main: .
    binary: zed-creds
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: zed-creds
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - app/config-example.yaml

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: megaproaktiv
    name: zed-bedrock-env
