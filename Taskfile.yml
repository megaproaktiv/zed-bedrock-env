# https://taskfile.dev

version: "3"

tasks:
  default:
    cmds:
      - task -l
    silent: true

  build:
    dir: app
    cmds:
      - go build -o ../bin/zed-creds main.go

  install:
    dir: app
    deps:
      - build
    cmds:
      - sudo mv ../bin/zed-creds /usr/local/bin/zed-creds

  snapshot:
    desc: Build a local snapshot release (no git tag required)
    cmds:
      - goreleaser release --snapshot --clean

  release:
    desc: Tag and publish a release (requires GITHUB_TOKEN and a clean git state)
    requires:
      vars: [VERSION]
    cmds:
      - git tag -a v{{.VERSION}} -m "Release v{{.VERSION}}"
      - git push origin v{{.VERSION}}
      - goreleaser release --clean
